name: .NET Desktop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SOLUTION: SimDesk.slnx
  TEST_PROJECT: tests/SimDesk.Core.Tests/SimDesk.Core.Tests.csproj
  APP_PROJECT: src/SimDesk.App/SimDesk.App.csproj
  SHELL_PROJECT: src/SimDesk.ShellExtension/SimDesk.ShellExtension.csproj
  DOTNET_VERSION: '10.0.x'

jobs:
  # ============================================================
  # Linux: Core 编译 + 测试，秒级反馈
  # ============================================================
  linux-test:
    name: Linux 测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: dotnet restore ${{ env.TEST_PROJECT }}
      - run: dotnet build ${{ env.TEST_PROJECT }} --no-restore
      - run: dotnet test ${{ env.TEST_PROJECT }} --no-build --verbosity normal

  # ============================================================
  # Windows: 编译 + 测试 + 发布为 zip + 上传产物
  # ============================================================
  build:
    name: Windows
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: dotnet restore ${{ env.SOLUTION }}
      - run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration ${{ matrix.configuration }}
      - run: dotnet test ${{ env.TEST_PROJECT }} --no-build --configuration ${{ matrix.configuration }} --verbosity normal

      # ======== Release: 发布 + 上传 ========

      - name: 发布 App
        if: matrix.configuration == 'Release'
        run: >
          dotnet publish ${{ env.APP_PROJECT }}
          --configuration Release
          --runtime win-x64
          --self-contained true
          -o publish/SimDesk

      - name: 发布 Shell 扩展
        if: matrix.configuration == 'Release'
        run: >
          dotnet publish ${{ env.SHELL_PROJECT }}
          --configuration Release
          --runtime win-x64
          --self-contained true
          -o publish/ShellExt

      - name: 上传产物
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: SimDesk-win-x64
          path: publish/
          retention-days: 30
